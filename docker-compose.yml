services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /healthz HTTP/1.0\\r\\n\\r\\n\" >&3' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://host.docker.internal:3000}
    volumes:
      - ./proxy_config.yaml:/proxy_config.yaml
    command: ["--config", "/proxy_config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health', timeout=4)\" 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 6s
      retries: 18
      start_period: 25s

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      LOG_FILE_PATH: "/app/logs/ezeechatbot.log"
      SQLITE_DB_PATH: /data/stats.db
      LITELLM_PROXY_URL: http://litellm-proxy:4000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      PDF_OCR_ENABLED: ${PDF_OCR_ENABLED:-true}
      PDF_OCR_MIN_IMAGE_COUNT: ${PDF_OCR_MIN_IMAGE_COUNT:-1}
      PDF_OCR_RENDER_DPI: ${PDF_OCR_RENDER_DPI:-110}
      PDF_OCR_MAX_PAGES: ${PDF_OCR_MAX_PAGES:-5}
      PDF_OCR_MIN_TEXT_CHARS: ${PDF_OCR_MIN_TEXT_CHARS:-40}
      PDF_VISION_ENABLED: ${PDF_VISION_ENABLED:-false}
      PDF_VISION_MODEL: ${PDF_VISION_MODEL:-gpt-4.1-mini}
      PDF_VISION_RENDER_DPI: ${PDF_VISION_RENDER_DPI:-110}
      PDF_VISION_MAX_PAGES: ${PDF_VISION_MAX_PAGES:-3}
      PDF_VISION_MIN_IMAGE_COUNT: ${PDF_VISION_MIN_IMAGE_COUNT:-1}
      PDF_VISION_MIN_TEXT_CHARS: ${PDF_VISION_MIN_TEXT_CHARS:-80}
      PDF_VISION_TIMEOUT_SEC: ${PDF_VISION_TIMEOUT_SEC:-12}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://host.docker.internal:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - api_data:/data
      - ./logs:/app/logs
    depends_on:
      qdrant:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
    restart: on-failure

volumes:
  qdrant_storage:
  api_data:
